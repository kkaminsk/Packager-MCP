services:
  packager-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "10101:10101"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
    volumes:
      # Optional: Mount config file
      - ./packager-mcp.yaml:/app/packager-mcp.yaml:ro
    restart: unless-stopped
